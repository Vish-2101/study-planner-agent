<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Planner</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="grid-bg"></div>
    <div class="container container-card">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
            </div>
            <h1>Smart Scheduler</h1>
            <p>Weighted generation based on your actual workload and chapters pending.</p>
        </header>

        <form id="planner-form">
            <div class="subjects-header">
                <h3>Subjects</h3>
                <button type="button" id="add-subject-btn" class="btn-ghost">+ Add</button>
            </div>
            
            <div id="subjects-container">
                <!-- Dynamic Subject Rows populated by JS -->
            </div>
            
            <div class="divider"></div>

            <div class="row">
                <div class="form-group">
                    <label for="days">Days Until Exam</label>
                    <input type="number" id="days" name="days" min="1" placeholder="e.g. 5" required>
                </div>
                <div class="form-group">
                    <label for="hours">Daily Study Hours</label>
                    <input type="number" id="hours" name="hours" min="1" max="24" placeholder="e.g. 4" required>
                </div>
            </div>

            <button type="submit" id="submit-btn" class="btn-primary">
                <span>Engage Agent & Sync</span>
                <div class="loader-spinner"></div>
            </button>
        </form>

        <div id="status-message" class="hidden">
            <div class="thinking-animation">
                <span></span><span></span><span></span>
            </div>
            <p>Executing mathematical weights and communicating with Google Calendar...</p>
            <p class="sub-text">Please keep an eye on your terminal for authorization requests.</p>
        </div>

        <div id="result-container" class="hidden">
            <h2>Your Schedule</h2>
            <div id="agent-output" class="content-box"></div>
            <button id="reset-btn" class="btn-ghost" style="margin-top: 20px; width: 100%;">Create Another</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
